<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>login | Glossier</title>
    <link rel="shortcut icon" href="./images/common/favi.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/login.css">
    <script src="./scripts/login.js" defer></script>

</head>
<body>
    <div class="page">
        <!-- Background -->
        <div class="page__bg-image" aria-hidden="true">
            <img src="./images/common/login_bg (2).png" alt="" />
        </div>
        <div class="page__bg-overlay" aria-hidden="true"></div>
        <!-- Logo -->
        <div class="logo">
            <img src="./images/common/logo_01.png" alt="Glossier" />
        </div>
        <!-- Input fields + options -->
        <div style="display:flex;flex-direction:column;gap:20px;width:100%;max-width:500px;position:relative;z-index:2;">
            <div class="form-fields">
                <div class="input-wrap">
                    <input type="text" id="userId" placeholder="Enter your ID" autocomplete="username" />
                </div>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
                </div>
            </div>
            <div class="form-options">
                <label class="stay-signed-in">
                    <span class="checkbox">
                        <input type="checkbox" id="stay-signed-in" />
                        <span class="checkbox__icon"></span>
                    </span>
                    <span>Stay signed in</span>
                </label>
                <a href="#" class="forgot-link">Forgot your email or password?</a>
            </div>
        </div>
        <!-- Buttons + error -->
        <div class="form-actions" style="position:relative;z-index:2;">
            <span class="error-msg" id="error-msg">*오류메세지</span>
            <div class="buttons">
                <button class="btn btn--login" id="login-btn">Login</button>
                <button class="btn btn--signup" id="signup-btn">Sign up</button>
            </div>
        </div>
        <!-- Social login -->
        <div class="social-login" style="position:relative;z-index:2;">
            <div class="social-login__divider">
                <div class="divider-line"></div>
                <span class="divider-text">Social login</span>
                <div class="divider-line"></div>
            </div>
            <div class="social-icons">
                <button class="social-icon" aria-label="카카오 로그인">
                    <img src="https://www.figma.com/api/mcp/asset/2882c38a-d7ad-41c2-83b1-5b046c8d8688" alt="Kakao" />
                </button>
                <button class="social-icon" aria-label="구글 로그인">
                    <img src="https://www.figma.com/api/mcp/asset/e4d6acd3-3f78-4795-bd2e-db536563fd8c" alt="Google" />
                </button>
                <button class="social-icon" aria-label="네이버 로그인">
                    <img src="https://www.figma.com/api/mcp/asset/8ef6062c-4b36-4351-936e-327ffd85a88a" alt="Naver" />
                </button>
                <button class="social-icon" aria-label="애플 로그인">
                    <img src="https://www.figma.com/api/mcp/asset/1f1a1860-d49f-46b8-8a2b-a8c2168dce25" alt="Apple" />
                </button>
            </div>
        </div>
    </div>
</body>
</html>
